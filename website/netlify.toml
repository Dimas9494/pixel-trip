[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION      = "20"
  EVOLVE_CONTRACT   = "0x8D0b7Eb6A057ed921a1d6E245b899Beca1B1Bf77"
  MAINNET_RPC_URL   = "https://ethereum-rpc.publicnode.com"
  IMAGE_BASE_URL    = "https://pixeltripnft.website/Test/stage2/images"
  STAGE1_META_BASE  = "https://pixeltripnft.website/Test/metadata"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/images/burn/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
